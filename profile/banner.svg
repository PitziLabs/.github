<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="Pitzi Labs — Production that shows up when the business does.">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1628"/>
      <stop offset="1" stop-color="#1c3552"/>
    </linearGradient>
  </defs>

  <!-- surface -->
  <rect width="1280" height="340" fill="url(#navy)"/>

  <!-- faint graph-paper grid -->
  <g stroke="#e08438" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 48H1280M0 96H1280M0 144H1280M0 192H1280M0 240H1280M0 288H1280"/>
    <path d="M48 0V340M96 0V340M144 0V340M192 0V340M240 0V340M288 0V340M336 0V340M384 0V340M432 0V340M480 0V340M528 0V340M576 0V340M624 0V340M672 0V340M720 0V340M768 0V340M816 0V340M864 0V340M912 0V340M960 0V340M1008 0V340M1056 0V340M1104 0V340M1152 0V340M1200 0V340M1248 0V340"/>
  </g>

  <!-- giant ghost :> watermark, clipped by the viewBox -->
  <text x="1015" y="500" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace"
        font-weight="700" font-size="560" fill="#e08438" fill-opacity="0.07" letter-spacing="-28">:&gt;</text>

  <!-- eyebrow -->
  <text x="66" y="84" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace"
        font-size="17" letter-spacing="3" fill="#e08438">PRACTICE · EST. 1999 · INFRASTRUCTURE OPS</text>

  <!-- wordmark + :> smile -->
  <text x="64" y="178" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700"
        font-size="92" letter-spacing="-3" fill="#faf7f2">Pitzi Labs<tspan dx="6" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace" fill="#e08438">:&gt;</tspan></text>

  <!-- tagline -->
  <text x="66" y="236" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400"
        font-size="29" letter-spacing="-0.5" fill="#d8cec2">Production <tspan fill="#e08438">that shows up</tspan> when the business does.</text>

  <!-- runbook subline -->
  <text x="66" y="296" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace"
        font-size="18" letter-spacing="1" fill="#8aa0bd">build it · break it · operate it</text>
</svg>
